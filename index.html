<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css" media="all">
    <link rel="stylesheet" href="style/mobie.css" media="screen and (max-width: 550px)">
    <link rel="stylesheet" href="style/tablet.css" media="screen and (min-width: 551px) and (max-width: 800px)">
    <link rel="stylesheet" href="style/menu.css"  media="screen and (max-width: 800px)">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Arcade</title>
</head>
<body>
    <header class="mainHeader">
        <a href="#"><img src="img/logo.png" alt="logo"></a>
        <nav>
            <ul class="menu">
                <li id="liProducts"><a href="#">Products</a>
                    <ul class="dropdown">
                        <li><a href="#">Best Sellers</a></li>
                        <li><a href="#">Games</a></li>
                        <li><a href="#">Consoles</a></li>
                        <li><a href="#">Controls</a></li>
                        <li><a href="#">Acessórios</a></li>
                    </ul>
                </li>
                <li><a href="#">Promotions</a></li>
                <li><a href="#">Contacts</a></li>
                <li id="liLogin"><a href="#">Login</a></li>
                <li><a class="material-symbols-outlined">add_shopping_cart</a></li>
            </ul>
            <button class="material-symbols-outlined" id="btn-mobile" onclick="toggleMenu()">menu</button>
        </nav>
    </header>
    <section class="background-img">
        <div class="grandiente">
            <div class="informar">
                <div id="card">
                    <p>More Power to Your Gaming</p>
                    <p id="prominence_cyberKid">CYBER KID INFINITE</p>
                    <p>Available For PC and Console</p>
                    <button>Buy Now</button>
                </div>
                <div id="card-img">
                    <img src="img/Cyber_copy.png" alt="image cyber kid">
                </div>
            </div>
        </div>
    </section>
    <section class="Best-Selling-Product">
        <header>
            <h2>Best Sellers</h2>
            <button>See more</button>
        </header>
        <div class="carousel">
            <span class="material-symbols-outlined">arrow_back_ios</span>
            <div class="container">
                <img src="img/anciebtsouls.webp" alt="anciebtsouls">
                <img src="img/chronoplit.webp" alt="chronoplit">
                <img src="img/control.webp" alt="control">
                <img src="img/keyboard.webp" alt="keyboard">
                <img src="img/mouse.webp" alt="mouse">
                <img src="img/playbox.webp" alt="playbox">
                <img src="img/wave.webp" alt="wave">
            </div>
            <span class="material-symbols-outlined">arrow_forward_ios</span>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
